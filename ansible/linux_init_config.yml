- name: Linux Initial Configuration
  hosts: linux
  vars_files:
    - vars/management.yml
  environment:
    PATH: "{{ ansible_task_path }}"
  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - linux_paths is defined
          - linux_paths | length > 0
        fail_msg: >
          Missing required variables. Make sure vars/management.yml is populated.
          Required: linux_paths, linux_breakglass_bin, linux_root_bin
      run_once: true
  roles:
    - {role: linux_init_config, ignore_errors: yes}
