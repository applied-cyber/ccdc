- name: Linux Harden
  hosts: linux
  vars_files:
    - vars/management.yml
  environment:
    PATH: "{{ ansible_task_path }}"
  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - linux_root_bin is defined
          - management_server is defined
        fail_msg: >
          Missing required variables. Make sure vars/management.yml is populated.
          Required: linux_root_bin, management_server
      run_once: true
  roles:
    - {role: linux_harden, ignore_errors: yes}
