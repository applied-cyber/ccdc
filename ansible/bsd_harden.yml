- name: BSD Hardening
  hosts: bsd
  vars_files:
    - vars/management.yml
  environment:
    PATH: "{{ ansible_task_path }}"
  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - linux_root_bin is defined
          - host_files is defined
        fail_msg: >
          Missing required variables. Make sure vars/management.yml is populated.
          Required: linux_root_bin, host_files
      run_once: true
  roles:
    - {role: bsd_harden, ignore_errors: yes}
