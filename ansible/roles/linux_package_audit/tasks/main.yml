---
# All binaries audit can impersonate.  If a binary exists on the target,
# it is moved to /root/.local/bin (preserving symlink chains) and replaced
# with a symlink to /usr/local/bin/audit.
#
# The order matters: move everything first, THEN create symlinks, so that
# relative symlinks between binaries (e.g. iptables -> iptables-nft) are
# preserved intact inside the backup directory.
#
# On modern distros /bin -> /usr/bin and /sbin -> /usr/sbin, so we just
# search /usr/bin and /usr/sbin.  The symlinks from /bin and /sbin still
# resolve through to our audit symlinks automatically.

