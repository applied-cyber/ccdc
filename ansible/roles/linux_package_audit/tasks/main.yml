- name: Create backup directory
  file:
    path: /root/.local/bin
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install audit binary
  copy:
    src: audit
    dest: /usr/local/bin/audit
    owner: root
    group: root
    mode: "0755"

# Move originals to backup and symlink audit in one shell task.
# Existence checks happen in the shell loop — no per-binary stat needed.

- name: Move originals to backup and symlink audit
  shell: |
    # Copy mv, ln, rm to backup first so we have working copies
    for b in mv ln rm; do
      src=$(command -v "$b" 2>/dev/null)
      if [ -n "$src" ] && [ ! -e "/root/.local/bin/$b" ]; then
        cp "$src" "/root/.local/bin/$b"
      fi
    done
    MV=/root/.local/bin/mv
    LN=/root/.local/bin/ln
    RM=/root/.local/bin/rm
    BINS="{{ audit_binaries | join(' ') }}"
    for bin in $BINS; do
      for dir in /usr/bin /usr/sbin /bin /sbin; do
        entry="$dir/$bin"
        if [ -e "$entry" ] || [ -L "$entry" ]; then
          if [ ! -e "/root/.local/bin/$bin" ]; then
            $MV "$entry" "/root/.local/bin/$bin"
          else
            $RM -f "$entry"
          fi
          $LN -sf /usr/local/bin/audit "$entry"
        fi
      done
    done
  args:
    executable: /bin/sh
