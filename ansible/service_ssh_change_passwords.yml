- name: Apply SSH user credential changes from generated files
  hosts: linux:bsd
  gather_facts: no
  vars_files:
    - vars/management.yml
  environment:
    PATH: "{{ ansible_task_path }}"
  pre_tasks:
    - name: Validate scored_ports is defined
      assert:
        that:
          - scored_ports is defined
        fail_msg: >
          scored_ports is not defined for {{ inventory_hostname }}.
          Add scored_ports=22,80,... to the host line in your inventory.
      ignore_errors: no

    - name: Validate SSH is a scored service
      assert:
        that:
          - "'22' in scored_ports.split(',')"
        fail_msg: >
          Port 22 is not in scored_ports for {{ inventory_hostname }}.
          This playbook only targets hosts with scored SSH (port 22).
      ignore_errors: no

    - name: Validate host_files is defined
      assert:
        that:
          - host_files is defined
        fail_msg: >
          Missing required variable: host_files.
          Make sure vars/management.yml is populated.
      ignore_errors: no
      run_once: true

    - name: Check that credentials file exists
      stat:
        path: "{{ host_files }}/ssh_creds_{{ inventory_hostname }}"
      register: creds_file
      delegate_to: localhost

    - name: Fail if credentials file is missing
      assert:
        that:
          - creds_file.stat.exists
        fail_msg: >
          No credentials file found at {{ host_files }}/ssh_creds_{{ inventory_hostname }}.
          Run service_ssh_generate_passwords.yml first.
      ignore_errors: no

  tasks:
    - name: Read credentials file
      slurp:
        src: "{{ host_files }}/ssh_creds_{{ inventory_hostname }}"
      register: creds_raw
      delegate_to: localhost

    - name: Parse credentials
      set_fact:
        password_map: "{{ dict(creds_raw.content | b64decode | trim | split('\n') | map('split', ',') | map('first') | zip(creds_raw.content | b64decode | trim | split('\n') | map('split', ',') | map('last'))) }}"

    - name: Validate parsed credentials
      assert:
        that:
          - password_map | length > 0
        fail_msg: >
          Credentials file for {{ inventory_hostname }} parsed to empty.
          Check format is username,password (one per line).

    - name: Backup /etc/passwd and /etc/shadow
      fetch:
        src: "/etc/{{ item }}"
        dest: "{{ host_files }}"
      with_items:
        - passwd
        - shadow

    - name: Change user passwords
      user:
        name: "{{ item.key }}"
        password: "{{ item.value | password_hash }}"
      loop: "{{ password_map | dict2items }}"
