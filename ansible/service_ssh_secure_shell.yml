- name: Secure SSH with forced esh shell for scored users
  hosts: linux:bsd
  gather_facts: no
  vars_files:
    - vars/management.yml
  environment:
    PATH: "{{ ansible_task_path }}"
  pre_tasks:
    - name: Validate scored_ports is defined
      assert:
        that:
          - scored_ports is defined
        fail_msg: >
          scored_ports is not defined for {{ inventory_hostname }}.
          Add scored_ports=22,80,... to the host line in your inventory.
      ignore_errors: no

    - name: Validate SSH is a scored service
      assert:
        that:
          - "'22' in scored_ports.split(',')"
        fail_msg: >
          Port 22 is not in scored_ports for {{ inventory_hostname }}.
          This playbook only targets hosts with scored SSH (port 22).
      ignore_errors: no

    - name: Check esh binary exists in role files
      stat:
        path: "{{ playbook_dir }}/roles/service_ssh_secure_shell/files/esh"
      register: esh_binary
      delegate_to: localhost
      run_once: true

    - name: Fail if esh binary is missing
      assert:
        that:
          - esh_binary.stat.exists
        fail_msg: >
          esh binary not found at roles/service_ssh_secure_shell/files/esh.
          Place the esh binary there before running this playbook.
      ignore_errors: no
      run_once: true

  roles:
    - service_ssh_secure_shell
