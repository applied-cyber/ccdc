- name: "DRY RUN: Generate SSH user credentials (does NOT change any passwords)"
  hosts: linux:bsd
  gather_facts: no
  vars_files:
    - vars/management.yml
  environment:
    PATH: "{{ ansible_task_path }}"
  pre_tasks:
    - name: Validate scored_ports is defined
      assert:
        that:
          - scored_ports is defined
        fail_msg: >
          scored_ports is not defined for {{ inventory_hostname }}.
          Add scored_ports=22,80,... to the host line in your inventory.
      ignore_errors: no

    - name: Validate SSH is a scored service
      assert:
        that:
          - "'22' in scored_ports.split(',')"
        fail_msg: >
          Port 22 is not in scored_ports for {{ inventory_hostname }}.
          This playbook only targets hosts with scored SSH (port 22).
      ignore_errors: no

    - name: Validate host_files is defined
      assert:
        that:
          - host_files is defined
        fail_msg: >
          Missing required variable: host_files.
          Make sure vars/management.yml is populated.
      ignore_errors: no
      run_once: true

  tasks:
    - name: Retrieve all users with a login shell
      shell: cat /etc/passwd | grep sh$ | cut -d ":" -f 1 | grep -v root | grep -v osogof | grep -v ccdcadmin
      register: users

    - name: Generate a random password for each user
      set_fact:
        password_map: "{{ password_map | default({}) | combine({item: lookup('password', '/dev/null chars=ascii_letters,digits length=24')}) }}"
      loop: "{{ users.stdout_lines }}"

    - name: Write credentials file
      copy:
        content: "{{ password_map | dict2items | map(attribute='key') | zip(password_map | dict2items | map(attribute='value')) | map('join', ',') | join('\n') }}\n"
        dest: "{{ host_files }}/ssh_creds_{{ inventory_hostname }}"
      delegate_to: localhost

    - name: Display generated credentials
      debug:
        msg: "Credentials written to {{ host_files }}/ssh_creds_{{ inventory_hostname }}"
